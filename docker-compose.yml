services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    # 태그(pg16)만 쓰면 재빌드 시점마다 베이스 이미지 glibc가 바뀌어 기존 DB와
    # 콜레이션 버전이 어긋날 수 있음 (CREATE DATABASE 실패) — digest로 고정
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    environment:
      POSTGRES_USER: ezyreview
      POSTGRES_PASSWORD: ezyreview
      POSTGRES_DB: main_db
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezyreview"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    environment:
      TZ: Asia/Seoul
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=info
    env_file: .env
    environment:
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
